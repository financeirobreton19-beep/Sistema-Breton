// ============================================
// FUNÇÃO QUE CALCULA PREV. CHEGADA = DATA FAT + 20 DIAS
// ============================================
function calcularPrevisaoChegada() {
    const dataFat = document.getElementById('lan_data_fat')?.value;
    if (dataFat) {
        const data = new Date(dataFat);
        data.setDate(data.getDate() + 20);
        const ano = data.getFullYear();
        const mes = String(data.getMonth() + 1).padStart(2, '0');
        const dia = String(data.getDate()).padStart(2, '0');
        const prevChegadaInput = document.getElementById('lan_prev_chegada');
        if (prevChegadaInput) prevChegadaInput.value = `${ano}-${mes}-${dia}`;
    }
}

// ============================================
// FUNÇÃO DE VALIDAÇÃO DE DATAS (APENAS ENTREGA NÃO PODE SER ANTES DO PAGAMENTO)
// ============================================
function validarDatas(lancamento) {
    if (lancamento.data_pagto && lancamento.entrega) {
        const dataPagto = new Date(lancamento.data_pagto);
        const dataEntrega = new Date(lancamento.entrega);
        if (dataEntrega < dataPagto) {
            alert('⚠️ Atenção: Data de entrega não pode ser anterior à data de pagamento!');
            return false;
        }
    }
    return true;
}

// ============================================
// FUNÇÃO DE LOADING
// ============================================
function showLoading(button, text = 'Salvando...') {
    const originalText = button.innerHTML;
    button.disabled = true;
    button.innerHTML = `<span class="loading-spinner"></span> ${text}`;
    return originalText;
}

function hideLoading(button, originalText) {
    button.disabled = false;
    button.innerHTML = originalText;
}

// FUNÇÃO CORRIGIDA: SÓ DESTACA SE NÃO FOR ENTREGUE E DATA VENCIDA OU PRÓXIMA (≤ 7 DIAS)
// ============================================
function isPedidoAtrasado(lancamento) {
    // Se já foi entregue, NUNCA destaca
    if (lancamento.status === 'ENTREGUE') return false;
    
    // Se não tem data de entrega, não destaca
    if (!lancamento.entrega) return false;
    
    const hoje = new Date();
    const dataEntrega = new Date(lancamento.entrega);
    
    // Calcula quantos dias faltam (positivo = futuro, negativo = vencido)
    const diffDias = Math.ceil((dataEntrega - hoje) / 86400000);
    
    // Destaca se: vencido (diffDias < 0) OU faltam 7 dias ou menos (diffDias <= 7)
    return diffDias <= 7;
}

function formatarData(dataStr) {
    if (!dataStr) return '-';
    try { const [a,m,d] = dataStr.split('-'); return `${d}/${m}/${a}`; } catch { return dataStr; }
}

function formatarValor(valor) {
    if (valor === undefined || valor === null) return '-';
    return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatarValorInput(input) {
    let valor = input.value;
    if (!valor) { input.value = '0,00'; return; }
    valor = valor.replace(/\./g, '').replace(',', '.');
    let num = parseFloat(valor);
    if (!isNaN(num)) input.value = num.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    else input.value = '0,00';
}

function converterValorParaNumero(valorStr) {
    if (!valorStr) return 0;
    return parseFloat(valorStr.replace(/\./g, '').replace(',', '.')) || 0;
}

function gerarProximoCodFornecedor() {
    const nums = fornecedores.map(f => parseInt(f.cod.replace('FOR',''))).filter(n => !isNaN(n));
    return 'FOR' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3,'0');
}

function buscarClientePorPedido(pedido) { return clientes.find(c => c.pedido == pedido); }

function calcularPrazoMedio(pagto, entrega) {
    if (!pagto || !entrega) return null;
    return Math.round((new Date(entrega) - new Date(pagto)) / 86400000);
}

function calcularTempoPagamento(dataPedido, dataPagto) {
    if (!dataPedido || !dataPagto) return null;
    return Math.round((new Date(dataPagto) - new Date(dataPedido)) / 86400000);
}

function getStatusClass(status) {
    if (!status) return 'pendente';
    const map = { 
        'FATURADO':'faturado', 
        'AG. FATURAMENTO':'ag-faturamento', 
        'PRORROGADO':'prorrogado', 
        'EM ABERTO':'em-aberto', 
        'ATRASADO':'atrasado', 
        'ENTREGUE':'entregue', 
        'EM ROTA':'em-rota', 
        'CANCELADO':'cancelado' 
    };
    return map[status.toUpperCase()] || 'pendente';
}

function getStatusBadge(status) {
    if (!status) return '<span class="status-badge pendente">PENDENTE</span>';
    const classe = getStatusClass(status);
    const up = status.toUpperCase();
    return `<span class="status-badge ${classe}">${up}</span>`;
}

function gerarLembretes() {
    const lembretes = [], hoje = new Date(); hoje.setHours(0,0,0,0);
    lancamentos.forEach(l => {
        if (l.prev_chegada) {
            const diff = Math.round((new Date(l.prev_chegada) - hoje) / 86400000);
            if (diff === 0) lembretes.push({tipo:'urgente', icon:'🔴', msg:`HOJE: Pedido #${l.pedido} - CHEGADA`});
            else if (diff === 1) lembretes.push({tipo:'alerta-1d', icon:'🟠', msg:`AMANHÃ: Pedido #${l.pedido} - Chegada`});
            else if (diff <= 7 && diff > 1) lembretes.push({tipo:'alerta-7d', icon:'🟡', msg:`${diff}d: Pedido #${l.pedido} - Chegada`});
        }
        if (l.entrega && l.status !== 'ENTREGUE') {
            const diff = Math.round((new Date(l.entrega) - hoje) / 86400000);
            if (diff === 0) lembretes.push({tipo:'urgente', icon:'🔴', msg:`HOJE: Pedido #${l.pedido} - ENTREGA`});
            else if (diff === 1) lembretes.push({tipo:'alerta-1d', icon:'🟠', msg:`AMANHÃ: Pedido #${l.pedido} - Entrega`});
            else if (diff <= 7 && diff > 1) lembretes.push({tipo:'alerta-7d', icon:'🟡', msg:`${diff}d: Pedido #${l.pedido} - Entrega`});
        }
        if (l.status === 'ATRASADO') lembretes.push({tipo:'urgente', icon:'⚠️', msg:`ATRASADO: Pedido #${l.pedido}`});
    });
    return lembretes.slice(0,8);
}

function aplicarOrdenacao(lista) {
    return [...lista].sort((a, b) => {
        let valA, valB;
        switch(currentOrder) {
            case 'data':
                valA = a.data || '';
                valB = b.data || '';
                break;

                valB = (b.cliente || '').toLowerCase();
                break;
            case 'pedido':
                valA = a.pedido || 0;
                valB = b.pedido || 0;
                break;
            case 'status':
                valA = (a.status || '').toLowerCase();
                valB = (b.status || '').toLowerCase();
                break;
            default:
                valA = a.data || '';
                valB = b.data || '';
        }
        
        if (currentOrderDirection === 'asc') {
            return valA > valB ? 1 : -1;
        } else {

        }
    });
}

function aplicarFiltroTipo(lista) {
    if (currentFilterType === "TODOS") return lista;
    return lista.filter(l => l.tipo === currentFilterType);
}

function getLancamentosFiltrados() {
    let filtrados = aplicarFiltroTipo(lancamentos);
    filtrados = aplicarOrdenacao(filtrados);
    return filtrados;
}

function calcularTotais(lista) {
    const totalPedidos = lista.length;
    const totalValor = lista.reduce((acc, l) => acc + (l.valor || 0), 0);
    const totalItens = lista.reduce((acc, l) => acc + (l.itens || 0), 0);
    const totalAtrasados = lista.filter(l => isPedidoAtrasado(l)).length;
    return { totalPedidos, totalValor, totalItens, totalAtrasados };
}

async function fazerLogin() {

    await carregarDados();
    
    const usuario = usuarios.find(u => u.nome === nome);
    if (!usuario) { alert('Usuário não encontrado!'); return; }
    if (usuario.senha && usuario.senha !== senha) { alert('Senha incorreta!'); return; }
    
    usuarioAtual = nome;
    usuarioPermissao = nome === 'Admin' ? 'admin' : 'user';
    
    const menuUsuarios = getElement('menuUsuarios');
    const menuLogs = getElement('menuLogs');
    const sidebar = getElement('sidebar');
    const footer = getElement('footer');
    const footerVerse = getElement('footerVerse');
    
    if (menuUsuarios) menuUsuarios.style.display = nome === 'Admin' ? 'block' : 'none';
    if (menuLogs) menuLogs.style.display = nome === 'Admin' ? 'block' : 'none';

    try {
        let p = document.getElementById('cli_pedido')?.value, d = document.getElementById('cli_data')?.value, n = document.getElementById('cli_nome')?.value;

            await db.collection('clientes').doc(id).delete();
            clientes = clientes.filter(c => c.id !== id);
            await adicionarLog('EXCLUIU CLIENTE', c.cliente);

        } catch (error) {
            console.error('Erro ao excluir cliente:', error);

        await adicionarLog('ADICIONOU FORNECEDOR', nome);
        mostrar('fornecedores');
    } catch (error) {
        console.error('Erro ao adicionar fornecedor:', error);
        alert('❌ Erro ao salvar! Tente novamente.');
    } finally {
        hideLoading(btn, originalText);
    }
}

async function excluirFornecedor(id) {
    if (confirm('⚠️ Excluir fornecedor?')) {
        try {
            const f = fornecedores.find(f => f.id === id);
            await db.collection('fornecedores').doc(id).delete();
            fornecedores = fornecedores.filter(f => f.id !== id);
            await adicionarLog('EXCLUIU FORNECEDOR', f.nome);
            mostrar('fornecedores');
        } catch (error) {
            console.error('Erro ao excluir fornecedor:', error);
            alert('❌ Erro ao excluir!');
        }
    }
}

    let b = document.getElementById('buscaFornecedor')?.value.toLowerCase() || '';

function abrirModalEdicaoFornecedor(id) {

async function salvarEdicaoFornecedor(id) {
    const btn = document.getElementById('btnSalvarFornecedor');
    if (!btn) return;
    const originalText = showLoading(btn, 'Salvando...');
    
    try {
        const f = fornecedores.find(f => f.id === id);
        f.nome = document.getElementById('edit_for_nome')?.value?.toUpperCase() || f.nome;
        f.cpf_cnpj = document.getElementById('edit_for_cpf')?.value || '';
        f.condicao = document.getElementById('edit_for_condicao')?.value || '';

        mostrar('fornecedores');

        console.error('Erro ao editar fornecedor:', error);
        alert('❌ Erro ao salvar!');
    } finally {
        hideLoading(btn, originalText);
    }
}

// FUNÇÃO PARA ATUALIZAR CONTADOR DE CARACTERES
// ============================================
function atualizarContadorCaracteres(textarea, maxChars = 100) {
    const length = textarea.value.length;
    const counter = document.getElementById('obsCharCounter');
    if (counter) {
        counter.textContent = `${length}/${maxChars}`;
        counter.classList.remove('warning', 'danger');
        if (length > maxChars * 0.8) counter.classList.add('warning');
        if (length >= maxChars) counter.classList.add('danger');
    }
    if (length > maxChars) {
        textarea.value = textarea.value.substring(0, maxChars);
        atualizarContadorCaracteres(textarea, maxChars);
    }
}

async function adicionarLancamento() {
    const btn = document.getElementById('btnSalvarLancamento');
    if (!btn) return;
    const originalText = showLoading(btn, 'Salvando...');
    
    try {
        if (!document.getElementById('lan_categoria')?.value) { alert('Categoria obrigatória!'); return; }
        let valorRaw = document.getElementById('lan_valor')?.value || '0,00';
        let valorNumerico = converterValorParaNumero(valorRaw);
        let observacoes = document.getElementById('lan_observacoes')?.value || '';
        if (observacoes.length > 100) observacoes = observacoes.substring(0, 100);
        
        let l = {
            pedido: document.getElementById('lan_pedido')?.value,
            data: document.getElementById('lan_data')?.value,
            mes: document.getElementById('lan_mes')?.value,
            tipo: document.getElementById('lan_tipo')?.value,
            cliente: document.getElementById('lan_cliente')?.value,
            oc: document.getElementById('lan_oc')?.value?.toUpperCase(),
            fornecedor: document.getElementById('lan_fornecedor')?.value,
            categoria: document.getElementById('lan_categoria')?.value,
            itens: parseInt(document.getElementById('lan_itens')?.value) || 0,
            produtos: document.getElementById('lan_produtos')?.value?.toUpperCase(),
            valor: valorNumerico,
            data_pagto: document.getElementById('lan_data_pagto')?.value,
            condicao: document.getElementById('lan_condicao')?.value,
            prev_fat: document.getElementById('lan_prev_fat')?.value,
            novo_prazo: document.getElementById('lan_novo_prazo')?.value,
            prev_chegada: document.getElementById('lan_prev_chegada')?.value,
            status: document.getElementById('lan_status')?.value,
            data_fat: document.getElementById('lan_data_fat')?.value,
            nf: document.getElementById('lan_nf')?.value?.toUpperCase(),
            transportadora: document.getElementById('lan_transportadora')?.value?.toUpperCase(),
            chegada: document.getElementById('lan_chegada')?.value,
            conferencia: document.getElementById('lan_conferencia')?.value,
            entrega: document.getElementById('lan_entrega')?.value,
            prazo_final: document.getElementById('lan_prazo_final')?.value,
            observacoes: observacoes,
            usuario: usuarioAtual,
            criado: new Date().toISOString()
        };
        
        if (!l.pedido) { alert('Pedido obrigatório!'); return; }
        
        if (!validarDatas(l)) return;
        
        const docRef = await db.collection('lancamentos').add(l);
        lancamentos.push({ id: docRef.id, ...l });
        await adicionarLog('ADICIONOU LANÇAMENTO', `Pedido ${l.pedido}`);
        mostrar('lancamentos');
    } catch (error) {
        console.error('Erro ao adicionar lançamento:', error);
        alert('❌ Erro ao salvar! Tente novamente.');
    } finally {
        hideLoading(btn, originalText);
    }
}

async function excluirLancamento(id) {
    if (confirm('⚠️ Excluir lançamento?')) {
        try {
            const l = lancamentos.find(l => l.id === id);
            if (!l) return;
            await db.collection('lancamentos').doc(id).delete();
            lancamentos = lancamentos.filter(l => l.id !== id);
            await adicionarLog('EXCLUIU LANÇAMENTO', `Pedido ${l.pedido}`);
            mostrar('lancamentos');
        } catch (error) {
            console.error('Erro ao excluir:', error);
            alert('❌ Erro ao excluir!');
        }
    }
}

async function duplicarLancamento(id) {
    if (confirm('Deseja duplicar este pedido? Será criado um novo pedido com número sequencial.')) {
        try {
            const original = lancamentos.find(l => l.id === id);
            if (!original) return;
            
            let novoPedido = parseInt(original.pedido) + 1;
            const novo = { ...original };
            delete novo.id;
            novo.pedido = novoPedido;
            novo.observacoes = original.observacoes ? `[CÓPIA] ${original.observacoes.substring(0, 90)}` : 'CÓPIA DO PEDIDO';
            novo.criado = new Date().toISOString();
            novo.usuario = usuarioAtual;
            
            const docRef = await db.collection('lancamentos').add(novo);
            lancamentos.push({ id: docRef.id, ...novo });
            await adicionarLog('DUPLICOU LANÇAMENTO', `Pedido ${original.pedido} → ${novoPedido}`);
            mostrar('lancamentos');
        } catch (error) {
            console.error('Erro ao duplicar:', error);
            alert('❌ Erro ao duplicar!');
        }
    }
}

async function anexarArquivo(pedido) {
    const file = document.getElementById('fileInput')?.files[0];
    if (!file) return;
    try {
        const reader = new FileReader();
        reader.onload = async function(e) {
            const novo = { pedido, nome: file.name, tipo: file.type, data: new Date().toISOString(), conteudo: e.target.result, usuario: usuarioAtual };
            const docRef = await db.collection('anexos').add(novo);
            anexos.push({ id: docRef.id, ...novo });
            await adicionarLog('ANEXOU ARQUIVO', file.name);
            fecharModal('modalAnexos');
            abrirModalAnexos(pedido);
        };
        reader.readAsDataURL(file);
    } catch (error) {
        console.error('Erro ao anexar arquivo:', error);
        alert('❌ Erro ao anexar arquivo!');
    }
}

function baixarAnexo(id) { 
    const a = anexos.find(a => a.id === id);
    if (a && a.conteudo) {
        const link = document.createElement('a'); 
        link.href = a.conteudo; 
        link.download = a.nome; 
        link.click();
    }
}

async function excluirAnexo(id, pedido) { 
    if (confirm('Excluir anexo?')) { 
        try {
            await db.collection('anexos').doc(id).delete(); 
            anexos = anexos.filter(a => a.id !== id); 
            await adicionarLog('EXCLUIU ANEXO', ''); 
            fecharModal('modalAnexos'); 
            abrirModalAnexos(pedido);
        } catch (error) {
            console.error('Erro ao excluir anexo:', error);
            alert('❌ Erro ao excluir!');
        }
    } 
}

function alterarTipoPeriodoRelatorio() {
    const tipo = document.getElementById('filtroPeriodo').value;
    if (tipo === 'personalizado') return;
    const hoje = new Date();
    let inicio, fim;
    switch(tipo) {
        case 'hoje': inicio = new Date(); fim = new Date(); inicio.setHours(0,0,0,0); fim.setHours(23,59,59,999); break;
        case '7d': fim = new Date(); inicio = new Date(); inicio.setDate(inicio.getDate() - 7); break;
        case '30d': fim = new Date(); inicio = new Date(); inicio.setDate(inicio.getDate() - 30); break;
        case 'mes': inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1); fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0); break;
        case 'mespassado': inicio = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 1); fim = new Date(hoje.getFullYear(), hoje.getMonth(), 0); break;
        case 'trimestre': const trim = Math.floor(hoje.getMonth() / 3); inicio = new Date(hoje.getFullYear(), trim * 3, 1); fim = new Date(hoje.getFullYear(), trim * 3 + 3, 0); break;
        case 'semestre': const sem = Math.floor(hoje.getMonth() / 6); inicio = new Date(hoje.getFullYear(), sem * 6, 1); fim = new Date(hoje.getFullYear(), sem * 6 + 6, 0); break;
        case 'ano': inicio = new Date(hoje.getFullYear(), 0, 1); fim = new Date(hoje.getFullYear(), 11, 31); break;
        default: return;
    }
    document.getElementById('filtroDataInicio').value = inicio.toISOString().split('T')[0];
    document.getElementById('filtroDataFim').value = fim.toISOString().split('T')[0];
}

function aplicarFiltrosRelatorio() {
    let dados = [...lancamentos];
    const dataInicio = document.getElementById('filtroDataInicio')?.value;
    const dataFim = document.getElementById('filtroDataFim')?.value;
    if (dataInicio && dataFim) {
        dados = dados.filter(l => l.data && new Date(l.data) >= new Date(dataInicio) && new Date(l.data) <= new Date(dataFim));
    }
    const filtroOC = document.getElementById('filtroOC')?.value; if (filtroOC) dados = dados.filter(l => l.oc && l.oc.toLowerCase().includes(filtroOC.toLowerCase()));
    const filtroPedido = document.getElementById('filtroPedido')?.value; if (filtroPedido) dados = dados.filter(l => l.pedido == filtroPedido);
    const filtroCondicao = document.getElementById('filtroCondicao')?.value; if (filtroCondicao) dados = dados.filter(l => l.condicao === filtroCondicao);
    gerarRelatorios(dados);
}

function gerarRelatorios(dados) {
    const total = dados.length;
    const meses = {}; dados.forEach(l=>{ if(l.data){ let d=new Date(l.data); let m=d.toLocaleString('pt-BR',{month:'long',year:'numeric'}); meses[m]=(meses[m]||0)+1; } });
    const status = {}; dados.forEach(l=>{ let s=l.status||'PENDENTE'; status[s]=(status[s]||0)+1; });
    const cond = {}; dados.forEach(l=>{ let c=l.condicao||'SEM CONDIÇÃO'; cond[c]=(cond[c]||0)+1; });
    const cat = {}; dados.forEach(l=>{ let c=l.categoria||'SEM CATEGORIA'; cat[c]=(cat[c]||0)+1; });
    const clientesRank = {}; dados.forEach(l=>{ if(l.cliente) clientesRank[l.cliente]=(clientesRank[l.cliente]||0)+1; });
    const topClientes = Object.entries(clientesRank).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const fornRank = {}; dados.forEach(l=>{ if(l.fornecedor) fornRank[l.fornecedor]=(fornRank[l.fornecedor]||0)+1; });
    const topForn = Object.entries(fornRank).sort((a,b)=>b[1]-a[1]).slice(0,5);
    
    document.getElementById('conteudoRelatorios').innerHTML = `
        <div class="kpi-grid"><div class="kpi-card"><h4>Total Pedidos</h4><div class="value">${total}</div></div><div class="kpi-card"><h4>Total Itens</h4><div class="value">${dados.reduce((a,l)=>a+(l.itens||0),0)}</div></div><div class="kpi-card"><h4>Entregues</h4><div class="value">${dados.filter(l=>l.status==='ENTREGUE').length}</div></div><div class="kpi-card"><h4>Pendentes</h4><div class="value">${dados.filter(l=>l.status==='EM ABERTO' || !l.status).length}</div></div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0"><div class="chart-container"><h4>📅 Pedidos por Mês</h4> <table style="width:100%">${Object.entries(meses).map(([m,q])=>`<tr><td>${m}<\/td><td>${q}<\/td><\/tr>`).join('')}<\/table><\/div>
        <div class="chart-container"><h4>📌 Pedidos por Status</h4> <table style="width:100%">${Object.entries(status).map(([s,q])=>`<tr><td>${s}<\/td><td>${q}<\/td><\/tr>`).join('')}<\/table><\/div>
        <div class="chart-container"><h4>💰 Pedidos por Condição</h4> <table style="width:100%">${Object.entries(cond).map(([c,q])=>`<tr><td>${c}<\/td><td>${q}<\/td><\/tr>`).join('')}<\/table><\/div>
        <div class="chart-container"><h4>🏷️ Pedidos por Categoria</h4> <table style="width:100%">${Object.entries(cat).map(([c,q])=>`<tr><td>${c}<\/td><td>${q}<\/td><\/tr>`).join('')}<\/table><\/div><\/div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px"><div class="chart-container"><h4>🏆 Top Clientes</h4> <table style="width:100%">${topClientes.map(([c,q])=>`<tr><td>${c}<\/td><td>${q} pedidos<\/td><\/tr>`).join('')}<\/table><\/div>
        <div class="chart-container"><h4>🏭 Top Fornecedores</h4> <table style="width:100%">${topForn.map(([f,q])=>`<tr><td>${f}<\/td><td>${q} pedidos<\/td><\/tr>`).join('')}<\/table><\/div><\/div>
    `;
}

function exportarRelatoriosExcel() {
    if (lancamentos.length === 0) { alert('Não há dados!'); return; }
    const wsData = [['Nº Pedido','Data','Cliente','OC','Fornecedor','Categoria','Itens','Status','Condição','Entrega','Observações']];
    lancamentos.forEach(l => { wsData.push([l.pedido||'', formatarData(l.data), l.cliente||'', l.oc||'', l.fornecedor||'', l.categoria||'', l.itens||'', l.status||'', l.condicao||'', formatarData(l.entrega), (l.observacoes||'').substring(0,100)]); });
    const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(wsData); XLSX.utils.book_append_sheet(wb, ws, 'Relatório'); XLSX.writeFile(wb, `relatorio_${new Date().toISOString().slice(0,10)}.xlsx`);
    alert('Exportado!');
}

function gerarPDF() {
    const elemento = document.getElementById('conteudoRelatorios');
    if (!elemento) return;
    html2canvas(elemento).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(`relatorio_${new Date().toISOString().slice(0,10)}.pdf`);
    });
}

function telaDashboard() {
    return topBar() + `
        <div class="box">
            <h2>📈 Dashboard</h2>
            <div class="filtros-grid">
                <div class="filtro-item"><label>Período</label><select id="filtroPeriodoDashboard" onchange="alterarTipoPeriodoDashboard()"><option value="personalizado">Personalizado</option><option value="hoje">Hoje</option><option value="7d">Últimos 7 dias</option><option value="30d">Últimos 30 dias</option><option value="mes">Este mês</option><option value="mespassado">Mês passado</option><option value="trimestre">Este trimestre</option><option value="semestre">Este semestre</option><option value="ano">Este ano</option></select></div>
                <div class="filtro-item"><label>Data Início</label><input type="date" id="filtroDataInicioDash"></div>
                <div class="filtro-item"><label>Data Fim</label><input type="date" id="filtroDataFimDash"></div>
                <div class="filtro-actions"><button class="info" onclick="aplicarFiltroDashboard()">🔍 Filtrar</button></div>
            </div>
            <div id="conteudoDashboard"></div>
        </div>
    `;
}

function alterarTipoPeriodoDashboard() {
    const tipo = document.getElementById('filtroPeriodoDashboard').value;
    if (tipo === 'personalizado') return;
    const hoje = new Date();
    let inicio, fim;
    switch(tipo) {
        case 'hoje': inicio = new Date(); fim = new Date(); inicio.setHours(0,0,0,0); fim.setHours(23,59,59,999); break;
        case '7d': fim = new Date(); inicio = new Date(); inicio.setDate(inicio.getDate() - 7); break;
        case '30d': fim = new Date(); inicio = new Date(); inicio.setDate(inicio.getDate() - 30); break;
        case 'mes': inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1); fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0); break;
        case 'mespassado': inicio = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 1); fim = new Date(hoje.getFullYear(), hoje.getMonth(), 0); break;
        case 'trimestre': const trim = Math.floor(hoje.getMonth() / 3); inicio = new Date(hoje.getFullYear(), trim * 3, 1); fim = new Date(hoje.getFullYear(), trim * 3 + 3, 0); break;
        case 'semestre': const sem = Math.floor(hoje.getMonth() / 6); inicio = new Date(hoje.getFullYear(), sem * 6, 1); fim = new Date(hoje.getFullYear(), sem * 6 + 6, 0); break;
        case 'ano': inicio = new Date(hoje.getFullYear(), 0, 1); fim = new Date(hoje.getFullYear(), 11, 31); break;
        default: return;
    }
    document.getElementById('filtroDataInicioDash').value = inicio.toISOString().split('T')[0];
    document.getElementById('filtroDataFimDash').value = fim.toISOString().split('T')[0];
}

function aplicarFiltroDashboard() {
    let dados = [...lancamentos];
    const dataInicio = document.getElementById('filtroDataInicioDash')?.value;
    const dataFim = document.getElementById('filtroDataFimDash')?.value;
    if (dataInicio && dataFim) {
        dados = dados.filter(l => l.data && new Date(l.data) >= new Date(dataInicio) && new Date(l.data) <= new Date(dataFim));
    }
    gerarDashboard(dados);
}

function gerarDashboard(dados) {
    const lembretes = gerarLembretes();
    const total = dados.length;
    const entregues = dados.filter(l => l.status === 'ENTREGUE').length;
    const atrasados = dados.filter(l => l.status === 'ATRASADO').length;
    const pendentes = dados.filter(l => l.status === 'EM ABERTO' || l.status === 'EM ROTA' || !l.status).length;
    
    let totalDiasPagamento = 0, countPagamento = 0, totalDiasEntrega = 0, countEntrega = 0;
    dados.forEach(l => {
        const tempoPag = calcularTempoPagamento(l.data, l.data_pagto);
        if (tempoPag) { totalDiasPagamento += tempoPag; countPagamento++; }
        if (l.data && l.entrega) { const dias = Math.round((new Date(l.entrega) - new Date(l.data)) / 86400000); if (dias >= 0) { totalDiasEntrega += dias; countEntrega++; } }
    });
    const tempoMedioPagamento = countPagamento > 0 ? (totalDiasPagamento / countPagamento).toFixed(1) : 0;
    const tempoMedioEntrega = countEntrega > 0 ? (totalDiasEntrega / countEntrega).toFixed(1) : 0;
    
    const fornecedoresTempos = {};
    dados.forEach(l => {
        if (!l.fornecedor) return;
        if (l.data && l.entrega) { const dias = Math.round((new Date(l.entrega) - new Date(l.data)) / 86400000); if (dias >= 0) { if (!fornecedoresTempos[l.fornecedor]) fornecedoresTempos[l.fornecedor] = { total: 0, count: 0 }; fornecedoresTempos[l.fornecedor].total += dias; fornecedoresTempos[l.fornecedor].count++; } }
    });
    const rankingFornecedores = Object.entries(fornecedoresTempos).map(([n,d]) => ({ fornecedor: n, pedidos: d.count, prazoMedio: (d.total / d.count).toFixed(1) })).sort((a,b)=>a.prazoMedio-b.prazoMedio);
    
    if (window.graficoStatus) window.graficoStatus.destroy();
    if (window.graficoTipo) window.graficoTipo.destroy();
    if (window.graficoCondicao) window.graficoCondicao.destroy();
    
    document.getElementById('conteudoDashboard').innerHTML = `
        <div class="lembretes-bar">${lembretes.map(l=>`<span class="lembrete-item ${l.tipo}">${l.icon} ${l.msg}</span>`).join(' | ')}${lembretes.length===0?'✅ Nenhum lembrete':''}</div>
        <div class="kpi-grid"><div class="kpi-card"><h4>Total Pedidos</h4><div class="value">${total}</div></div><div class="kpi-card"><h4>Entregues</h4><div class="value">${entregues}</div></div><div class="kpi-card"><h4>Atrasados</h4><div class="value">${atrasados}</div></div><div class="kpi-card"><h4>Pendentes</h4><div class="value">${pendentes}</div></div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px"><div class="kpi-card"><h4>⏱️ Tempo Médio Pagamento</h4><div class="value">${tempoMedioPagamento} dias</div></div><div class="kpi-card"><h4>⏱️ Tempo Médio Entrega</h4><div class="value">${tempoMedioEntrega} dias</div></div></div>
        <div class="charts-grid"><div class="chart-container"><canvas id="graficoStatus"></canvas></div><div class="chart-container"><canvas id="graficoTipo"></canvas></div><div class="chart-container"><canvas id="graficoCondicao"></canvas></div></div>
        <h3>⏱️ Tempo Médio de Entrega por Fornecedor</h3><div class="table-container"><table class="auto-layout"><thead><tr><th>Fornecedor</th><th>Pedidos</th><th>Prazo Médio (dias)</th></tr></thead><tbody>${rankingFornecedores.map(f=>`<tr><td>${f.fornecedor}<\/td><td>${f.pedidos}<\/td><td>${f.prazoMedio}<\/td><\/tr>`).join('')}</tbody><\/table><\/div>
    `;
    
    const statusCount = {}; dados.forEach(l => { let s = l.status || 'PENDENTE'; statusCount[s] = (statusCount[s] || 0) + 1; });
    const ctx1 = document.getElementById('graficoStatus')?.getContext('2d'); if(ctx1) window.graficoStatus = new Chart(ctx1, { type: 'doughnut', data: { labels: Object.keys(statusCount), datasets: [{ data: Object.values(statusCount), backgroundColor: ['#5C2A2A','#8B5A5A','#B87A7A','#9e9e9e','#4caf50','#f44336'] }] }, options: { plugins: { title: { display: true, text: 'Pedidos por Status' } } } });
    
    const tipoCount = {}; dados.forEach(l => { let t = l.tipo || 'SEM TIPO'; tipoCount[t] = (tipoCount[t] || 0) + 1; });
    const ctx2 = document.getElementById('graficoTipo')?.getContext('2d'); if(ctx2) window.graficoTipo = new Chart(ctx2, { type: 'bar', data: { labels: Object.keys(tipoCount), datasets: [{ label: 'Quantidade', data: Object.values(tipoCount), backgroundColor: '#8B5A5A' }] }, options: { plugins: { title: { display: true, text: 'Pedidos por Tipo' } } } });
    
    const condCount = {}; dados.forEach(l => { let c = l.condicao || 'SEM CONDIÇÃO'; condCount[c] = (condCount[c] || 0) + 1; });
    const ctx3 = document.getElementById('graficoCondicao')?.getContext('2d'); if(ctx3) window.graficoCondicao = new Chart(ctx3, { type: 'bar', data: { labels: Object.keys(condCount), datasets: [{ label: 'Quantidade', data: Object.values(condCount), backgroundColor: '#8B5A5A' }] }, options: { plugins: { title: { display: true, text: 'Pedidos por Condição' } } } });
}

function telaUsuarios() {
    return topBar() + `
        <div class="box">
            <h2>👤 Gerenciar Usuários</h2>
            <div class="form-grid"><div class="form-group"><label class="required">Novo Usuário</label><input type="text" id="novo_usuario"></div><div class="form-group"><label>Senha</label><input type="password" id="nova_senha" placeholder="Deixe em branco"></div><div class="form-group" style="justify-content:flex-end"><button class="success" id="btnAdicionarUsuario" onclick="adicionarUsuario()">➕ Adicionar</button></div></div>
            <div class="table-container"><table class="auto-layout"><thead><tr><th>#</th><th>Usuário</th><th>Senha</th><th>Ações</th></tr></thead><tbody>
                ${usuarios.map((u,i)=>`<tr><td>${i+1}<\/td><td>${escapeHtml(u.nome)}<\/td><td>${u.senha?'••••••':'Sem senha'}<\/td><td class="acoes-cell"><button class="small" data-tooltip="Editar usuário" onclick="abrirModalEdicaoUsuario('${u.id}')">✏️</button><button class="small danger" data-tooltip="Excluir usuário" onclick="excluirUsuario('${u.id}')">🗑️</button><\/td><\/tr>`).join('')}
            </tbody><\/table><\/div>
        </div>
    `;
}

function abrirModalEdicaoUsuario(id) {
    const u = usuarios.find(u => u.id === id);
    const modal = getElement('modalUsuarios');
    const content = getElement('modalUsuarioContent');
    if (!modal || !content) return;
    content.innerHTML = `<div class="form-grid"><div class="form-group"><label>Nome</label><input type="text" id="edit_user_nome" value="${escapeHtml(u.nome)}"></div><div class="form-group"><label>Nova Senha</label><input type="password" id="edit_user_senha" placeholder="Deixe em branco"></div><div class="form-group"><label>Confirmar</label><input type="password" id="edit_user_confirm" placeholder="Digite novamente"></div></div><div style="text-align:right"><button class="success" id="btnSalvarUsuario" onclick="salvarEdicaoUsuario('${id}')">💾 SALVAR</button></div>`;
    modal.classList.add('active');
}

async function salvarEdicaoUsuario(id) {
    const btn = document.getElementById('btnSalvarUsuario');
    if (!btn) return;
    const originalText = showLoading(btn, 'Salvando...');
    
    try {
        const u = usuarios.find(u => u.id === id);
        const novoNome = document.getElementById('edit_user_nome')?.value;
        const novaSenha = document.getElementById('edit_user_senha')?.value;
        const confirm = document.getElementById('edit_user_confirm')?.value;
        if (!novoNome) { alert('Nome obrigatório!'); return; }
        if (usuarios.some((user,i)=>user.id !== id && user.nome===novoNome)) { alert('Nome já existe!'); return; }
        u.nome = novoNome;
        if (novaSenha) { if (novaSenha !== confirm) { alert('Senhas não conferem!'); return; } u.senha = novaSenha; }
        await db.collection('usuarios').doc(id).update(u);
        await adicionarLog('EDITOU USUÁRIO', u.nome);
        fecharModal('modalUsuarios');
        mostrar('usuarios');
    } catch (error) {
        console.error('Erro ao editar usuário:', error);
        alert('❌ Erro ao salvar!');
    } finally {
        hideLoading(btn, originalText);
    }
}

async function adicionarUsuario() {
    const btn = document.getElementById('btnAdicionarUsuario');
    if (!btn) return;
    const originalText = showLoading(btn, 'Salvando...');
    
    try {
        let nome = document.getElementById('novo_usuario')?.value;
        let senha = document.getElementById('nova_senha')?.value || '';
        if (!nome) { alert('Digite um nome!'); return; }
        if (usuarios.some(u=>u.nome===nome)) { alert('Nome já existe!'); return; }
        const novo = { nome, senha };
        const docRef = await db.collection('usuarios').add(novo);
        usuarios.push({ id: docRef.id, ...novo });
        await adicionarLog('ADICIONOU USUÁRIO', nome);
        mostrar('usuarios');
    } catch (error) {
        console.error('Erro ao adicionar usuário:', error);
        alert('❌ Erro ao adicionar!');
    } finally {
        hideLoading(btn, originalText);
    }
}

async function excluirUsuario(id) {
    if (usuarios.length <= 1) { alert('Não pode excluir o último!'); return; }
    const u = usuarios.find(u => u.id === id);
    if (u.nome === 'Admin') { alert('Não pode excluir o Admin!'); return; }
    if (confirm(`Excluir ${u.nome}?`)) {
        try {
            await db.collection('usuarios').doc(id).delete();
            usuarios = usuarios.filter(u => u.id !== id);
            if (usuarioAtual === u.nome) {
                usuarioAtual = usuarios[0].nome;
                usuarioPermissao = usuarioAtual === 'Admin' ? 'admin' : 'user';
                const menuUsuarios = getElement('menuUsuarios');
                const menuLogs = getElement('menuLogs');
                if (menuUsuarios) menuUsuarios.style.display = usuarioAtual === 'Admin' ? 'block' : 'none';
                if (menuLogs) menuLogs.style.display = usuarioAtual === 'Admin' ? 'block' : 'none';
            }
            await adicionarLog('EXCLUIU USUÁRIO', u.nome);
            mostrar('usuarios');
        } catch (error) {
            console.error('Erro ao excluir usuário:', error);
            alert('❌ Erro ao excluir!');
        }
    }
}

function telaLogs() {
    return topBar() + `<div class="box"><h2>📋 Logs</h2><div class="log-viewer">${logs.slice().reverse().map(l=>`<div class="log-entry"><span class="log-time">[${new Date(l.data).toLocaleString()}]</span> <span class="log-user">${escapeHtml(l.usuario)}</span> <span class="log-action">${escapeHtml(l.acao)}</span>${l.detalhe?` - ${escapeHtml(l.detalhe)}`:''}</div>`).join('')}${logs.length===0?'<div>Nenhum log.</div>':''}</div><div class="mt-20"><button class="danger" onclick="limparLogs()">🗑️ Limpar Logs</button></div></div>`;
}

async function limparLogs() {
    if (confirm('Limpar todos os logs?')) {
        try {
            const snapshot = await db.collection('logs').get();
            for (const doc of snapshot.docs) {
                await db.collection('logs').doc(doc.id).delete();
            }
            logs = [];
            await adicionarLog('LIMPOUS LOGS');
            mostrar('logs');
        } catch (error) {
            console.error('Erro ao limpar logs:', error);
            alert('❌ Erro ao limpar!');
        }
    }
}

// ============================================
// FUNÇÃO PRINCIPAL
// ============================================
async function mostrar(tela) {
    if (!usuarioAtual) { mostrarLogin(); return; }
    const main = getElement('main-content');
    if (!main) return;
    
    switch(tela) {
        case 'clientes': main.innerHTML = telaClientes(); break;
        case 'fornecedores': main.innerHTML = telaFornecedores(); break;
        case 'lancamentos': main.innerHTML = telaLancamentos(); setTimeout(() => renderLancamentos(), 100); break;
        case 'relatorios': main.innerHTML = telaRelatorios(); setTimeout(()=>aplicarFiltrosRelatorio(),100); break;
        case 'dashboard': main.innerHTML = telaDashboard(); setTimeout(()=>aplicarFiltroDashboard(),100); break;
        case 'anexos': main.innerHTML = telaAnexos(); break;
        case 'usuarios': if (usuarioPermissao !== 'admin') { alert('Acesso negado!'); mostrar('dashboard'); return; } main.innerHTML = telaUsuarios(); break;
        case 'logs': if (usuarioPermissao !== 'admin') { alert('Acesso negado!'); mostrar('dashboard'); return; } main.innerHTML = telaLogs(); break;
        default: main.innerHTML = telaClientes();
    }
    await adicionarLog('VISUALIZOU', tela);
}

// ============================================
// INICIALIZAÇÃO
// ============================================
carregarDados().then(() => {
    mostrarLogin();
});
</script>
